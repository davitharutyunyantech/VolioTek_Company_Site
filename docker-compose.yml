services:
  postgres:
    image: postgres:17-alpine
    container_name: voliotek-site-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: voliotek_site
    ports:
      - "5435:5432"
    volumes:
      - voliotek_site_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d voliotek_site"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  voliotek_site_postgres_data:
